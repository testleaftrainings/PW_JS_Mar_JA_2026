**5. The "Infinite Scroll" Dropdown**
Question: A dropdown only loads the next 10 items when you scroll to the bottom. How do you select the 50th item?

OPtion 1: Use a while() loop to scroll down until the 50th item is loaded, then select it.

Option2 : Use await page.keyboard.press('PageDown') in a loop to scroll down until the 50th item is visible, then select it.

**6.: How do you select multiple options in a standard <select multiple> element?**

Pass an array of values to the selectOption method, like this: 


✔ Option 1: Using values

await page.selectOption('#my-multi-select', ['aws', 'azure']);

✔ Option 2: Using labels

await page.selectOption('#my-multi-select', [
  { label: 'AWS' },
  { label: 'Azure' }
]);

✔ Option 3: Using values + labels mix
await page.selectOption('#my-multi-select', [
  { value: 'aws' },
  { label: 'Azure' }
]);

In Playwright, to select multiple options in a <select multiple> dropdown, we pass an array of values or option objects (label/value) directly to selectOption().


12. Static vs. Web-First URL Assertions
test('assertion timeout override',async({page})=>{

    expect(page.locator('#username')).toBeHidden({timeout:6000});
   
   
    const url=page.url()
    page.click('#login')
   expect(url).toBe('http://leaftaps.com/crmsfa/control/main') //=>non retry assertion
   await expect(page).toHaveURL('http://leaftaps.com/crmsfa/control/main',{timeout:6000}) //=>retrying assertion

})

13. Backward Traversal (Preceding Axis)
Logic: The preceding axis searches for all elements located before the current element in the entire document. Using index [1] selects the closest match moving backward.

XPath:
//button[text()='Save']/preceding::span[@class='error'][1]
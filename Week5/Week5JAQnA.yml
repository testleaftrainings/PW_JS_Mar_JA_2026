8.Your CI must run smoke tests on PRs and full regression on nightly builds. How will you configure Playwright test runner to support this?

Use tags (e.g., @smoke) and grep.
Command Line:
Smoke (PR): npx playwright test --grep @smoke

- name: Run Smoke Tests
    if: github.event_name == 'pull_request'
    run: npx playwright test --grep @smoke

  RUN FULL REGRESSION ON SCHEDULE
  - name: Run Full Regression
    if: github.event_name == 'schedule'

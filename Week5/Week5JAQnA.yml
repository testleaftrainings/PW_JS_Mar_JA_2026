6."When would you choose CSV over JSON for test data? How do you iterate through a JSON array to generate dynamic test cases in Playwright?"
Use for Data-Driven Testing (DDT) where you have hundreds of permutations of the same flat fields (e.g., a search field test with 500 different strings). It’s memory-efficient for the runner.
json:
ex : testcase.json

[
 {
   "username": "admin_user",
   "role": "admin",
   "details": {
     "permissions": ["create_user", "delete_user", "edit_settings"],
     "accessLevel": 10
   }
 },
 {
   "username": "guest_user",
   "role": "guest",
   "details": {
     "viewOnly": true,
     "expiryDays": 7
   }
 }
]

for(let i=0; i<=1; i++){
testcase[i].details.permissions
}

testcase[0].details.permissions // admin_user
testcase[1].details.expirtDays // admin_user



Best for nested, hierarchical data or when specific keys vary per object.
Iteration in Playwright

